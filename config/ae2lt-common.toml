#Internal config schema version. Do not edit; used by the mod for upgrade migrations.
# Default: 2
# Range: > 1
configVersion = 2

[lightningCollector]
	#Cooldown in ticks after each captured lightning strike.
	# Default: 0
	# Range: > 0
	cooldownTicks = 0

	[lightningCollector.outputProfile]
		#Minimum HV output before crystal bonuses are applied.
		# Default: 1
		# Range: > 0
		hvBaseMin = 1
		#Maximum HV output before crystal bonuses are applied.
		# Default: 2
		# Range: > 0
		hvBaseMax = 2
		#Minimum EHV output before crystal bonuses are applied.
		# Default: 1
		# Range: > 0
		ehvBaseMin = 1
		#Maximum EHV output before crystal bonuses are applied.
		# Default: 4
		# Range: > 0
		ehvBaseMax = 4
		#HV crystal count where bonus scaling starts.
		# Default: 2
		# Range: > 0
		hvCrystalStart = 2
		#HV crystal count where bonus scaling ends.
		# Default: 16
		# Range: > 0
		hvCrystalEnd = 16
		#EHV crystal count where bonus scaling starts.
		# Default: 2
		# Range: > 0
		ehvCrystalStart = 2
		#EHV crystal count where bonus scaling ends.
		# Default: 16
		# Range: > 0
		ehvCrystalEnd = 16
		#Fixed HV output for a perfect crystal.
		# Default: 16
		# Range: > 0
		perfectHvOutput = 16
		#Fixed EHV output for a perfect crystal.
		# Default: 16
		# Range: > 0
		perfectEhvOutput = 16
		#Fraction of output used as random spread. Range: > 0.
		# Default: 0.12
		# Range: 1.0E-6 ~ 1.7976931348623157E308
		spreadRatio = 0.12

[electroChimeCrystal]
	#Catalysis value needed to transform an electro chime crystal into its perfect form.
	# Default: 180
	# Range: > 1
	maxCatalysis = 180
	#Minimum catalysis gained per natural (EHV) lightning strike on the collector.
	# Default: 8
	# Range: > 1
	catalysisPerStrikeMin = 8
	#Maximum catalysis gained per natural (EHV) lightning strike on the collector.
	# Default: 12
	# Range: > 1
	catalysisPerStrikeMax = 12

[overloadTnt]
	#Controls whether overload TNT can damage terrain with the custom blast task.
	enableTerrainDamage = true
	#Maximum blocks processed per tick across all overload TNT tasks.
	# Default: 2400
	# Range: > 0
	globalBlockBudgetPerTick = 2400
	#Maximum lightning strikes processed per tick across all overload TNT tasks.
	# Default: 8
	# Range: > 0
	globalLightningBudgetPerTick = 8

	[network.overloadedController]
		#Extra channels provided by each overloaded controller.
		# Default: 128
		# Range: > 0
		channelsPerController = 128
		#Passive AE injected per tick by an overloaded controller.
		# Default: 100.0
		# Range: 0.0 ~ 1.7976931348623157E308
		passiveAePerTick = 100.0

	[network.wirelessConnector]
		#Maximum block distance for Overloaded Wireless Connect Tool links.
		#Only limits links from overloaded providers, interfaces, and power supplies to target machines.
		#Set to 0 to disable this distance limit.
		# Default: 128
		# Range: > 0
		maxDistance = 128

[overloadProcessingFactory]
	#Parallel operations provided by each Lightning Collapse Matrix.
	# Default: 8
	# Range: 0 ~ 67108863
	parallelPerMatrix = 8
	#Internal FE buffer capacity of the Overload Processing Factory.
	# Default: 640000000
	# Range: 1 ~ 9223372036854775807
	energyCapacity = 640000000
	#Maximum FE consumed per tick with no Speed Cards installed.
	# Default: 400000
	# Range: 0 ~ 9223372036854775807
	fePerTickBase = 400000
	#Maximum FE consumed per tick with 1 Speed Card installed.
	# Default: 2000000
	# Range: 0 ~ 9223372036854775807
	fePerTick1SpeedCard = 2000000
	#Maximum FE consumed per tick with 2 Speed Cards installed.
	# Default: 8000000
	# Range: 0 ~ 9223372036854775807
	fePerTick2SpeedCards = 8000000
	#Maximum FE consumed per tick with 3 Speed Cards installed.
	# Default: 32000000
	# Range: 0 ~ 9223372036854775807
	fePerTick3SpeedCards = 32000000
	#Maximum FE consumed per tick with 4 Speed Cards installed.
	# Default: 128000000
	# Range: 0 ~ 9223372036854775807
	fePerTick4SpeedCards = 128000000

[artificialLightning]
	#Controls whether Overload Crystals in the hotbar or offhand can trigger artificial lightning.
	triggerFromHotbar = true
	#Controls whether Overload Crystals in the main inventory can trigger artificial lightning.
	triggerFromBackpack = false

	[teslaCoil.modeCosts]
		#Overload Crystal Dust cost for High Voltage mode.
		# Default: 2
		# Range: > 0
		highVoltageDustCost = 2
		#FE cost for High Voltage mode. Range: >= 1.
		# Default: 25000
		# Range: > 1
		highVoltageFe = 25000
		#High Voltage Lightning input cost for Extreme High Voltage mode.
		# Default: 8
		# Range: > 0
		extremeHighVoltageInput = 8
		#FE cost for Extreme High Voltage mode. Range: >= 1.
		# Default: 500000
		# Range: > 1
		extremeHighVoltageFe = 500000

[pigmeeFumo]
	#Controls whether players receive a Pigmee Fumo as a gift on their first login.
	giftOnFirstJoin = true
