[general]
	#Starting stages for new players (v1.3)
	#List of stage IDs to auto-grant on first join
	#Example: ["stone_age", "tutorial_complete"]
	#Set to empty list [] for no starting stages
	starting_stages = ["stone_age"]
	#Team mode: "ftb_teams" (requires FTB Teams mod) or "solo" (each player is their own team)
	#If "ftb_teams", stages are shared across team members
	#If "solo", each player has independent progression
	team_mode = "ftb_teams"
	#Enable debug logging for stage checks, lock queries, and team operations
	debug_logging = false
	#Enable linear progression (auto-grant dependency stages)
	#If true, granting a stage also auto-grants all missing dependencies recursively
	#If false, stages require explicit dependency satisfaction (admin can bypass with double-confirm)
	linear_progression = false
	#If true, starting_stages are checked and applied on EVERY login, not just on first join.
	#This lets pack devs add a starting stage to an existing world and have all online players pick it up next login.
	#Idempotent — already-granted stages are not re-granted. Default false to preserve original behavior.
	reapply_starting_stages_on_login = false

[enforcement]
	#Block item use (right-click with item in hand)
	block_item_use = true
	#Block item pickup (prevent picking up locked items from ground)
	block_item_pickup = true
	#Prevent locked items from being in the hotbar
	#When true, locked items in hotbar slots are moved to main inventory (not dropped)
	#When false, locked items can remain in the hotbar but still cannot be used
	#This is a softer alternative to block_item_inventory — lets players store items for later
	#Ignored if block_item_inventory is true (which drops items from everywhere)
	block_item_hotbar = true
	#Prevent picking up locked items with the mouse cursor in GUIs
	#When true, players cannot click on locked items in inventories/containers
	#When false, players can freely move locked items between inventory and chests
	#This allows players to store locked items for later use once they unlock the stage
	#Ignored if block_item_inventory is true (which blocks all interaction)
	block_item_mouse_pickup = true
	#Block item holding in inventory (auto-drop locked items)
	#This is the strictest option — locked items are dropped on the ground
	#If false, see block_item_hotbar and block_item_mouse_pickup for softer alternatives
	block_item_inventory = true
	#Frequency (in ticks; 20 = 1 second) to scan inventories and drop locked items.
	#Default 0 = disabled. Pickup blocking still prevents NEW locked items from
	#entering inventories. Periodic scanning is only useful when stages get
	#revoked mid-game and you want stale items auto-dropped — but it can also
	#fight with quest/reward mods that re-grant the same item every tick, which
	#produces a 'trail of dropped items' effect at the player's feet.
	#If you want auto-drop, try a low frequency like 200 (10s) first.
	# Default: 0
	# Range: 0 ~ 200
	inventory_scan_frequency = 0
	#Block crafting locked recipes
	block_crafting = true
	#Hide locked recipes from crafting table output
	hide_locked_recipe_output = true
	#Block placement of locked blocks
	block_block_placement = true
	#Block right-clicking locked blocks
	block_block_interaction = true
	#Block travel to locked dimensions
	block_dimension_travel = true
	#Block items from locked mods
	block_locked_mods = true
	#Block Create-style item-on-block interactions
	block_interactions = true
	#Block attacking locked entities
	#If true, players cannot attack entity types locked behind a stage
	block_entity_attack = true
	#Gate mob spawns behind stages
	#If true, mobs listed in spawn_entities / spawn_entity_tags / spawn_entity_mods
	#will be prevented from spawning in the world until the nearest player has the required stage.
	#Useful for 'world responds to progression' setups (e.g., Born In Chaos mobs only spawn after a quest).
	block_mob_spawns = true
	#Radius (in blocks) to search for the nearest player when gating mob spawns
	#If no player is within this radius of the spawn, the spawn is ALLOWED (no one will see it).
	#If a player is within range, their stages determine whether the spawn is allowed.
	#Default 128 blocks (~8 chunks, standard mob tracking range).
	# Default: 128
	# Range: 16 ~ 512
	mob_spawn_check_radius = 128
	#Gate enchantments behind stages
	#Strips locked enchantments from items in the player's inventory each scan,
	#and blocks anvils from applying locked enchantment books.
	block_enchants = true
	#Block opening locked containers/GUIs (screens category)
	block_screen_open = true
	#Block planting, bonemealing, and random-tick growth of locked crops.
	block_crop_growth = true
	#Block taming and breeding interactions with locked pets.
	block_pet_interact = true
	#Filter locked loot from mob drops and block drops before the nearest player can pick them up.
	block_loot_drops = true
	#Apply [[mobs.replacements]] - swap locked mobs with a configured substitute on spawn.
	block_mob_replacements = true
	#Enforce [[regions]] gating: push players back from locked regions, cancel locked block breaks/places, and clear explosions in locked regions.
	block_region_entry = true
	#How often (in ticks) to run region/structure entry checks. 20 = once per second.
	# Default: 20
	# Range: 1 ~ 200
	region_tick_frequency = 20
	#Enforce [structures].locked_entry gating: push players out of locked structures, apply structures.rules flags.
	block_structure_entry = true
	#Allow creative mode players to bypass stage locks
	#If true, players in creative mode can use/place locked items
	#They will still be locked when switching to survival
	allow_creative_bypass = true
	#If true, non-operator players see generic lock messages without stage names.
	#Operators (permission level >= 2) always see the full stage name.
	#Useful for spoiler-free progression in modpacks.
	reveal_stage_names_only_to_operators = true
	#Rename locked items to hide their identity
	#If true, locked items show as 'Unknown Item' instead of real name
	#Players must unlock the stage to see the real name
	mask_locked_item_names = true
	#Cooldown in milliseconds between lock notification messages
	#Prevents chat spam when standing on locked items
	# Default: 3000
	# Range: 0 ~ 30000
	notification_cooldown = 3000
	#Show chat message when player is blocked by a lock
	show_lock_message = true
	#Play sound when player is blocked by a lock
	play_lock_sound = true
	#Sound to play when blocked
	lock_sound = "minecraft:block.note_block.pling"
	#Sound volume (0.0 to 1.0)
	# Default: 1.0
	# Range: 0.0 ~ 1.0
	lock_sound_volume = 1.0
	#Sound pitch (0.5 to 2.0)
	# Default: 1.0
	# Range: 0.5 ~ 2.0
	lock_sound_pitch = 1.0
	#Send a chat warning to a player when they enter creative mode that creative
	#bypasses most ProgressiveStages locks. Only the affected player sees it.
	#Skipped automatically if allow_creative_bypass = false (no point warning
	#about a feature that's off). Players can opt out per-player via the command
	#/progressivestages no-creative-popup.
	show_creative_bypass_popup = true

[team]
	#Stages persist when leaving team
	persist_stages_on_leave = true

[emi]
	#Enable EMI integration
	enabled = true
	#Show lock icon overlay on locked items/recipes in EMI
	show_lock_icon = true
	#Lock icon position: top_left, top_right, bottom_left, bottom_right, center
	lock_icon_position = "top_left"
	#Lock icon size in pixels
	# Default: 8
	# Range: 4 ~ 32
	lock_icon_size = 8
	#Show semi-transparent highlight on locked recipe outputs
	show_highlight = true
	#Highlight color (ARGB hex format: 0xAARRGGBB)
	highlight_color = "0x50FFAA40"
	#Show lock info in item tooltips
	show_tooltip = true
	#Show locked recipes in EMI
	#If false, locked items and recipes will be hidden from EMI entirely
	#If true, locked items will show with lock overlays
	show_locked_recipes = false

[performance]
	#Cache lock queries for better performance
	enable_lock_cache = true
	#Cache size per player
	# Default: 1024
	# Range: 128 ~ 8192
	lock_cache_size = 1024

